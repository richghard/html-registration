<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COLLEGE ADMISSION FORM</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<div class="form-box">
<h2><i class="fa-solid fa-user-graduate"></i> ADMISSION FORM</h2>

<form>
<div class="field"><i class="fa-solid fa-user"></i><input type="text" placeholder="Full Name"></div>
<div class="field"><i class="fa-solid fa-envelope"></i><input type="email" placeholder="Email"></div>
<div class="field"><i class="fa-solid fa-phone"></i><input type="tel" placeholder="Phone Number"></div>
<div class="field"><i class="fa-solid fa-book"></i>
<select><option>Select Programme</option><option>Computer Science</option><option>Business Administration</option></select>
</div>
<button type="submit">Apply Now</button>
</form>

</div>
</body>
</html>
